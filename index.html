<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BTC/USDT</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav id="menu">
  <button id="menu-btn" class="icon-btn" aria-label="Settings menu" aria-haspopup="true" aria-expanded="false">
    <svg width="20" height="5" viewBox="0 0 20 5" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="2.5" cy="2.5" r="2.5" fill="currentColor"/>
      <circle cx="10"  cy="2.5" r="2.5" fill="currentColor"/>
      <circle cx="17.5" cy="2.5" r="2.5" fill="currentColor"/>
    </svg>
  </button>
  <ul id="menu-list">
    <li><button data-exchange="binance">Binance</button></li>
    <li><button data-exchange="bitstamp">Bitstamp</button></li>
    <li><button data-exchange="coinbase">Coinbase</button></li>
    <li><button data-exchange="kraken">Kraken</button></li>
    <li><button data-exchange="okx">OKX</button></li>
    <li class="menu-heading">Display</li>
    <li><label class="menu-toggle"><input type="checkbox" data-toggle="fees" checked> TX Fees</label></li>
    <li><label class="menu-toggle"><input type="checkbox" data-toggle="fng" checked> F&amp;G Index</label></li>
    <li><label class="menu-toggle"><input type="checkbox" data-toggle="change" checked> 24H % Change</label></li>
    <li><label class="menu-toggle"><input type="checkbox" data-toggle="cdc" checked> CDC Strip</label></li>
    <li><a id="dashboard-link" href="db.html">GO TO DASHBOARD</a></li>
  </ul>
</nav>
<div id="loading" role="status" aria-live="polite"><span class="d">·</span><span class="d">·</span><span class="d">·</span></div>
<section id="fees" aria-label="Recommended Bitcoin transaction fees in sat/vB">
  <div class="fee-cell">
    <span class="fee-label">No</span>
    <span class="fee-val" id="fee-no">–</span>
  </div>
  <div class="fee-group">
    <div class="fee-cell"><span class="fee-label">Low</span><span class="fee-val" id="fee-low">–</span></div>
    <div class="fee-cell"><span class="fee-label">Med</span><span class="fee-val" id="fee-med">–</span></div>
    <div class="fee-cell"><span class="fee-label">High</span><span class="fee-val" id="fee-high">–</span></div>
  </div>
</section>
<main id="price"><span id="price-int"></span><span class="dec-wrap"><span class="ind"><span id="price-fng" class="fng" hidden></span><span id="price-chg" class="chg" hidden></span></span><span class="dec">.<span id="price-dec"></span></span></span></main>
<div id="cdc-strip" role="img" aria-label="CDC Action Zone"></div>
<div id="ws-status">
  <span id="ws-pulse"></span>
  <span id="ws-label">connecting…</span>
</div>
<button id="fullscreen-btn" class="icon-btn" aria-label="Toggle fullscreen">
  <svg id="fs-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M1 6V1H6M15 6V1H10M1 10V15H6M15 10V15H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>
<script src="data/cdc.js"></script>
<script src="data/fng.js"></script>
<script src="app.js"></script>
</body>
</html>
