name: Update Fear & Greed data

on:
  schedule:
    # 00:10 UTC daily — CMC's index updates once a day; scheduled runs often
    # start late, which is fine for a daily reading
    - cron: '10 0 * * *'
  workflow_dispatch:       # allow manual runs from GitHub UI

permissions:
  contents: write

jobs:
  update-fng:
    runs-on: ubuntu-latest
    steps:
      # actions pinned to commit SHAs — this workflow has contents:write
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Fetch Fear & Greed data
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
        run: python3 fetch_fng.py

      - name: Commit updated Fear & Greed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fng.js
          git diff --cached --quiet || git commit -m "chore: update Fear & Greed data $(date -u +%Y-%m-%d)"
          git push
