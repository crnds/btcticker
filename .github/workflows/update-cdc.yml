name: Update CDC data

on:
  schedule:
    # 00:05 UTC daily, just after the Kraken daily candle closes; scheduled
    # runs typically start a few hours late, so the newest block reflects the
    # in-progress day
    - cron: '5 0 * * *'
  workflow_dispatch:       # allow manual runs from GitHub UI

permissions:
  contents: write

jobs:
  update-cdc:
    runs-on: ubuntu-latest
    steps:
      # actions pinned to commit SHAs — this workflow has contents:write
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Fetch CDC data
        run: python3 fetch_cdc.py

      - name: Commit updated CDC data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cdc.js
          git diff --cached --quiet || git commit -m "chore: update CDC data $(date -u +%Y-%m-%d)"
          git push
